<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Clothing Store</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">StyleHub</a>
      <ul class="nav-links">
        <li class="dropdown">
          <a href="#">Categories ▾</a>
          <ul class="dropdown-menu">
            <li><a href="shop.html?category=men">Men</a></li>
            <li><a href="shop.html?category=women">Women</a></li>
            <li><a href="shop.html?category=kids">Kids</a></li>
          </ul>
        </li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <a href="cart.html" class="cart-icon">Cart (<span id="cart-count">0</span>)</a>
    </div>
  </nav>

  <section class="shop-section">
    <div class="container">
      <div class="shop-layout">
        <!-- Filters Sidebar -->
        <aside class="filters">
          <h3>Filter Products</h3>
          
          <div class="filter-group">
            <h4>Category</h4>
            <label><input type="radio" name="category" value="all" checked> All</label>
            <label><input type="radio" name="category" value="men"> Men</label>
            <label><input type="radio" name="category" value="women"> Women</label>
            <label><input type="radio" name="category" value="kids"> Kids</label>
          </div>

          <div class="filter-group">
            <h4>Size</h4>
            <label><input type="checkbox" value="XS"> XS</label>
            <label><input type="checkbox" value="S"> S</label>
            <label><input type="checkbox" value="M"> M</label>
            <label><input type="checkbox" value="L"> L</label>
            <label><input type="checkbox" value="XL"> XL</label>
          </div>

          <div class="filter-group">
            <h4>Color</h4>
            <label><input type="checkbox" value="Black"> Black</label>
            <label><input type="checkbox" value="White"> White</label>
            <label><input type="checkbox" value="Blue"> Blue</label>
            <label><input type="checkbox" value="Red"> Red</label>
            <label><input type="checkbox" value="Gray"> Gray</label>
          </div>

          <div class="filter-group">
            <h4>Price Range</h4>
            <label><input type="radio" name="price" value="all" checked> All</label>
            <label><input type="radio" name="price" value="0-25"> $0 - $25</label>
            <label><input type="radio" name="price" value="25-50"> $25 - $50</label>
            <label><input type="radio" name="price" value="50-100"> $50 - $100</label>
            <label><input type="radio" name="price" value="100+"> $100+</label>
          </div>
        </aside>

        <!-- Products Grid -->
        <div class="products-container">
          <h2>All Products</h2>
          <div class="products-grid" id="products-list">
            <!-- Products loaded via JS -->
          </div>
          <p id="no-products" class="no-products" style="display:none;">No products found matching your filters.</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>
        <div class="social-icons">
          <a href="#">📘</a>
          <a href="#">📷</a>
          <a href="#">🐦</a>
        </div>
        <p class="contact-info">info@stylehub.com | +855 12 345 678</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
